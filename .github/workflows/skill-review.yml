name: Skill Review

on:
  pull_request:
    paths:
      - 'plugins/enterspeed/skills/**/SKILL.md'
      - '.claude-plugin/marketplace.json'

jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check marketplace version bump
        run: |
          BUMPED=$(git diff origin/main...HEAD -- .claude-plugin/marketplace.json | grep '^+.*"version"' || true)
          if [ -z "$BUMPED" ]; then
            echo "::warning::Plugin version not bumped — remember to increment the version in .claude-plugin/marketplace.json"
          fi
